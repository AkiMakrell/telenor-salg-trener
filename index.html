<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telenor Salg Trener</title>
  <style>
    :root {
      --primary:       #29a8e0;
      --primary-dark:  #1a7fb5;
      --primary-light: #d6eef9;
      --primary-xlight:#eaf6fd;
      --bg:            #dceefb;
      --card:          #ffffff;
      --text:          #1a2b3c;
      --muted:         #6a8099;
      --border:        #b8d9ef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 30px 20px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: var(--primary-dark);
      margin-bottom: 8px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .top-bar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .backup-btns {
      position: absolute;
      right: 0;
      display: flex;
      gap: 6px;
    }

    .backup-btn {
      padding: 5px 10px;
      border: 1px solid #ccc;
      background: white;
      color: #888;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .backup-btn:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .tab-btn {
      padding: 10px 28px;
      border: 2px solid var(--primary);
      background: white;
      color: var(--primary-dark);
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tab-btn.active, .tab-btn:hover {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(41,168,224,0.35);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto 20px auto;
      box-shadow: 0 2px 16px rgba(41,168,224,0.10);
      border: 1px solid var(--border);
    }

    .card h2 {
      color: var(--primary-dark);
      margin-bottom: 16px;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      background: var(--primary-xlight);
      color: var(--text);
      transition: border-color 0.15s;
    }

    textarea:focus { outline: none; border-color: var(--primary); background: white; }

    .radio-group { display: flex; gap: 16px; margin-top: 8px; }

    .toggle-group {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--primary-xlight);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      color: var(--text);
    }

    .toggle-btn:hover { border-color: var(--primary); background: var(--primary-light); }

    .toggle-btn.selected-ja {
      border-color: #28a745;
      background: #d4edda;
      color: #155724;
    }

    .toggle-btn.selected-nei {
      border-color: #dc3545;
      background: #f8d7da;
      color: #721c24;
    }

    .save-btn {
      margin-top: 16px;
      padding: 11px 26px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.15s;
      box-shadow: 0 3px 10px rgba(41,168,224,0.3);
    }

    .save-btn:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(41,168,224,0.4); }

    .result-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-yes { background: #d4edda; color: #155724; }
    .badge-no  { background: #f8d7da; color: #721c24; }

    .history-list { margin-top: 20px; }

    .history-item {
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      margin-bottom: 10px;
      background: var(--primary-xlight);
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
    }

    .history-item .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .objection-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      max-width: 720px;
      margin: 0 auto 14px auto;
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
      border: 1px solid var(--border);
    }

    .objection-card h3 {
      color: var(--primary-dark);
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .objection-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 20px 0;
    }

    .clear-btn {
      float: right;
      background: none;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .clear-btn:hover { border-color: #c00; color: #c00; }

    .add-objection-btn {
      padding: 12px 32px;
      background: white;
      border: 2px dashed var(--primary);
      color: var(--primary-dark);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-objection-btn:hover { background: var(--primary-light); }

    .delete-objection-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #ccc;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
      float: right;
    }
    .delete-objection-btn:hover { color: #c00; }

    /* Objection stats */
    .obj-stats-bar {
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--primary-xlight);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .obj-stats-numbers {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
      color: var(--text);
    }

    .obj-progress-track {
      height: 8px;
      background: #dde;
      border-radius: 99px;
      overflow: hidden;
    }

    .obj-progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .obj-best-answer {
      margin-top: 10px;
      padding: 10px 14px;
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      border-radius: 10px;
      font-size: 0.88rem;
    }

    .obj-best-label {
      font-weight: 700;
      color: #1a7a34;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .obj-best-rate {
      background: #d4edda;
      color: #155724;
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .obj-best-text {
      color: var(--text);
      line-height: 1.5;
    }

    .obj-history-toggle {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--primary-dark);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .obj-history-toggle:hover { background: var(--primary-xlight); border-color: var(--primary); }

    .obj-history-panel { display: none; }
    .obj-history-panel.open { display: block; }

    /* Objection summary panel */
    .obj-summary-panel {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 24px;
      max-width: 720px;
      margin: 0 auto 20px auto;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .obj-summary-panel h2 {
      color: var(--primary-dark);
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .obj-summary-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .obj-summary-row:last-child { border-bottom: none; }

    .obj-summary-name {
      flex: 1;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .obj-summary-mini-bar {
      flex: 1;
      height: 7px;
      background: #dde;
      border-radius: 99px;
      overflow: hidden;
    }

    .obj-summary-mini-fill {
      height: 100%;
      border-radius: 99px;
    }

    .obj-summary-pct {
      font-weight: 700;
      min-width: 42px;
      text-align: right;
    }

    .obj-summary-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }

    /* Intro library */
    .intro-library {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .intro-library-empty {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
    }

    .intro-chip {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--primary-xlight);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
      text-align: left;
    }

    .intro-chip:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .intro-chip.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      font-weight: 600;
    }

    .intro-chip-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #aaa;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .intro-chip-delete:hover { color: #c00; }

    .intro-chip-stats {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .intro-chip-stats .hit {
      color: #1a7a34;
      font-weight: 700;
    }

    /* Intro two-column layout */
    .intro-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    @media (max-width: 700px) {
      .intro-layout { grid-template-columns: 1fr; }
    }

    .leaderboard-card {
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 16px rgba(41,168,224,0.10);
      border: 1px solid var(--border);
    }

    .leaderboard-card h2 {
      color: var(--primary-dark);
      margin-bottom: 16px;
      font-size: 1.15rem;
    }

    .history-toggle-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--primary-dark);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-toggle-btn:hover {
      background: var(--primary-xlight);
      border-color: var(--primary);
    }

    .history-panel {
      display: none;
      margin-top: 4px;
    }

    .history-panel.open { display: block; }

    /* ===== STATS HOME PAGE ===== */
    .stats-section { max-width: 1100px; margin: 0 auto 32px auto; }

    .stats-section-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      gap: 14px;
    }
    .stats-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .stats-grid-2 { grid-template-columns: 1fr 1fr; }

    @media (max-width: 800px) {
      .stats-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .stats-grid-2 { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 18px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .stat-card.day-card { padding: 26px 18px; }

    .quick-register-card { padding-bottom: 16px !important; position: relative; }

    .quick-undo-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 0.85rem;
      color: #999;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s;
    }
    .quick-undo-btn:hover { border-color: #999; color: #555; background: #f0f0f0; }

    .quick-reg-btn {
      margin-top: 12px;
      padding: 10px 22px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #29a8e0, #1a7ab0);
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 14px rgba(41,168,224,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .quick-reg-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(41,168,224,0.45); }
    .quick-reg-btn:active { transform: scale(0.96); }

    .quick-reg-btn.salg {
      background: linear-gradient(135deg, #2ecc71, #1a9e52);
      box-shadow: 0 4px 14px rgba(46,204,113,0.35);
    }
    .quick-reg-btn.salg:hover { box-shadow: 0 6px 18px rgba(46,204,113,0.45); }

    .stat-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .stat-icon.big { font-size: 2.2rem; }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--primary-dark);
      line-height: 1;
    }
    .stat-value.big { font-size: 3rem; }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* Motivational banner */
    .today-date-banner {
      max-width: 1100px;
      margin: 0 auto 14px auto;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.02em;
    }

    .motivation-banner {
      max-width: 1100px;
      margin: 0 auto 24px auto;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
      padding: 0 4px;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-fill {
      width: 100%;
      background: var(--primary);
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height 0.4s ease;
      position: relative;
    }

    .bar-fill:hover { background: var(--primary-dark); }

    .bar-val {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 3px;
    }

    .bar-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 5px;
      text-align: center;
    }

    .chart-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .chart-card-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    /* Leaderboard progress bar */
    .intro-chip-bar-wrap {
      height: 6px;
      background: #e0e0e0;
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }

    .intro-chip-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .bar-green { background: #28a745; }
    .bar-yellow { background: #f0ad00; }
    .bar-red { background: #dc3545; }

    .intro-chip-pct {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1;
      flex-shrink: 0;
      min-width: 52px;
      text-align: right;
    }

    .pct-green { color: #1a7a34; }
    .pct-yellow { color: #9a6800; }
    .pct-red { color: #b52030; }

    .intro-chip.border-green { border-left: 4px solid #28a745; }
    .intro-chip.border-yellow { border-left: 4px solid #f0ad00; }
    .intro-chip.border-red { border-left: 4px solid #dc3545; }
    /* GIF overlay */
    #gif-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 18px;
      cursor: pointer;
      animation: fadeInOverlay 0.3s ease;
    }
    #gif-overlay.visible { display: flex; }
    #gif-img {
      max-width: min(520px, 90vw);
      max-height: 60vh;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #gif-label {
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; } to { opacity: 1; }
    }

  </style>
</head>
<body>

<!-- GIF OVERLAY -->
<div id="gif-overlay" onclick="closeGif()">
  <img id="gif-img" src="" alt="">
  <div id="gif-label"></div>
</div>

<img src="telenor_logo.png" alt="Telenor logo" style="display:block; margin: 0 auto 12px; height: 48px; object-fit: contain;">
<h1>📞 Telenor Salg Trener</h1>
<p class="subtitle">Tren på introer og innvendinger</p>

<div class="top-bar">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('hjem')">🏠 Hjem</button>
    <button class="tab-btn" onclick="switchTab('intro')">📞 Intro</button>
    <button class="tab-btn" onclick="switchTab('innvendinger')">💬 Innvendinger</button>
  </div>
  <div class="backup-btns">
    <button class="backup-btn" onclick="exportData()" title="Last ned sikkerhetskopi">💾 Eksporter data</button>
    <label class="backup-btn" title="Gjenopprett fra sikkerhetskopi">📂 Importer data<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
  </div>
</div>

<!-- ===== HJEM TAB ===== -->
<div id="tab-hjem" class="tab-content active">
  <div id="stats-home"></div>
</div>

<!-- ===== INTRO TAB ===== -->
<div id="tab-intro" class="tab-content">

  <div class="intro-layout">

    <!-- LEFT: input + history -->
    <div>
      <div class="card" style="margin:0 0 16px 0;">
        <h2>Registrer forsøk</h2>

        <label class="objection-label">Introtekst:</label>
        <textarea id="intro-text" placeholder="Hei, jeg ringer fra Telenor..."></textarea>

        <div style="margin-top: 14px;">
          <strong>Kom du forbi opptaksspørsmålet?</strong>
          <div class="toggle-group">
            <button class="toggle-btn" id="opptak-ja" onclick="selectOpptak('ja')">✅ Ja</button>
            <button class="toggle-btn" id="opptak-nei" onclick="selectOpptak('nei')">❌ Nei</button>
          </div>
        </div>

        <button class="save-btn" onclick="saveIntro()">Lagre forsøk</button>
        <button class="history-toggle-btn" onclick="toggleHistory()">📋 Vis historikk</button>
        <div id="history-panel" class="history-panel">
          <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 4px;">
            <span style="font-weight:600;color:var(--primary-dark);">Historikk</span>
            <button class="clear-btn" style="float:none;" onclick="clearIntroHistory()">Tøm</button>
          </div>
          <div id="intro-history" class="history-list"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: leaderboard -->
    <div class="leaderboard-card">
      <h2>🏆 Intro Leaderboard</h2>
      <div id="intro-library" class="intro-library"></div>
    </div>

  </div>
</div>

<!-- ===== INNVENDINGER TAB ===== -->
<div id="tab-innvendinger" class="tab-content">

  <div id="objections-container"></div>

  <div style="text-align:center; margin: 24px 0;">
    <button class="add-objection-btn" onclick="addObjection()">＋ Legg til innvending</button>
  </div>

</div>

<script>
  function toggleHistory() {
    const panel = document.getElementById('history-panel');
    const btn = document.querySelector('.history-toggle-btn');
    const open = panel.classList.toggle('open');
    btn.textContent = open ? '📋 Skjul historikk' : '📋 Vis historikk';
  }

  // ---- Tab switching ----
  function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
  }

  let selectedOpptak = null;
  let selectedOver5min = null;
  let selectedSalg = null;

  function selectOpptak(val) {
    selectedOpptak = val;
    document.getElementById('opptak-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('opptak-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function selectOver5min(val) {
    selectedOver5min = val;
    document.getElementById('over5min-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('over5min-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function selectSalg(val) {
    selectedSalg = val;
    document.getElementById('salg-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('salg-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function resetOpptak() {
    selectedOpptak = null;
    ['opptak-ja','opptak-nei']
      .forEach(id => document.getElementById(id).className = 'toggle-btn');
  }

  // ---- Intro ----
  let selectedIntroId = null;

  function getSavedIntros() {
    return JSON.parse(localStorage.getItem('savedIntros') || '[]');
  }

  function addToIntroLibrary(text) {
    const intros = getSavedIntros();
    const exists = intros.some(i => i.text.trim() === text.trim());
    if (exists) return;
    intros.push({ id: Date.now().toString(), text, createdAt: new Date().toISOString() });
    localStorage.setItem('savedIntros', JSON.stringify(intros));
  }

  function deleteSavedIntro(id) {
    if (!confirm('Slette denne introen fra biblioteket?')) return;
    const intros = getSavedIntros().filter(i => i.id !== id);
    localStorage.setItem('savedIntros', JSON.stringify(intros));
    if (selectedIntroId === id) {
      selectedIntroId = null;
      document.getElementById('intro-text').value = '';
    }
    renderIntroLibrary();
  }

  function selectIntro(id) {
    const intros = getSavedIntros();
    const intro = intros.find(i => i.id === id);
    if (!intro) return;
    selectedIntroId = id;
    document.getElementById('intro-text').value = intro.text;
    renderIntroLibrary();
  }

  function clearIntroSelection() {
    selectedIntroId = null;
    document.getElementById('intro-text').value = '';
    document.getElementById('intro-text').focus();
    renderIntroLibrary();
  }

  // ---- Stats helpers ----
  function isoToDate(iso) { return iso ? new Date(iso) : null; }

  function isToday(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const n = new Date();
    return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
  }

  function isThisWeek(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay() + 6) % 7)); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 7);
    return d >= mon && d < sun;
  }

  function isThisMonth(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const n = new Date();
    return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth();
  }

  function statsFor(entries) {
    const introEntries = entries.filter(h => !h.quickEntry);
    const total = introEntries.length;
    const opptak = introEntries.filter(h => h.opptak === 'ja').length;
    const over5 = entries.filter(h => h.over5min === 'ja').length;
    const salg = entries.filter(h => h.salg === 'ja').length;
    const hitrate = total > 0 ? Math.round(opptak / total * 100) : null;
    return { total, opptak, over5, salg, hitrate };
  }

  function statCard(icon, value, label, big = false) {
    return `<div class="stat-card${big ? ' day-card' : ''}">
      <div class="stat-icon${big ? ' big' : ''}">${icon}</div>
      <div class="stat-value${big ? ' big' : ''}">${value}</div>
      <div class="stat-label">${label}</div>
    </div>`;
  }

  function barChart(data) {
    // data = [{label, value}]
    const max = Math.max(...data.map(d => d.value), 1);
    return `<div class="bar-chart">` + data.map(d => {
      const h = Math.round((d.value / max) * 100);
      return `<div class="bar-col">
        <div class="bar-val">${d.value > 0 ? d.value : ''}</div>
        <div class="bar-fill" style="height:${h}%"></div>
        <div class="bar-lbl">${d.label}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  function renderStatsHome() {
    const history = getIntroHistory();
    const dagEntries = history.filter(h => isToday(h.isoDate));
    const ukeEntries = history.filter(h => isThisWeek(h.isoDate));
    const mndEntries = history.filter(h => isThisMonth(h.isoDate));

    const dag = statsFor(dagEntries);
    const uke = statsFor(ukeEntries);
    const mnd = statsFor(mndEntries);

    // Motivation
    const motivations = [
      [80, '🔥 Du er i toppform i dag! Fortsett slik!'],
      [60, '💪 Bra jobbet! Du er på rett vei!'],
      [40, '📈 God innsats! Øvelse gjør mester!'],
      [0,  '🌱 Hvert forsøk teller – hold det gående!'],
    ];
    const msg = dag.total === 0 ? '👋 Ingen forsøk registrert i dag ennå – lykke til!' :
      motivations.find(([min]) => (dag.hitrate ?? 0) >= min)[1];

    // Week bar chart: 5-min per weekday (Mon–Fri only)
    const days = ['Man','Tir','Ons','Tor','Fre'];
    const now = new Date();
    const monOffset = (now.getDay() + 6) % 7;
    const weekData = days.map((lbl, i) => {
      const day = new Date(now); day.setDate(now.getDate() - monOffset + i); day.setHours(0,0,0,0);
      const next = new Date(day); next.setDate(day.getDate() + 1);
      const count = ukeEntries.filter(h => { const d = new Date(h.isoDate); return d >= day && d < next && h.over5min === 'ja'; }).length;
      return { label: lbl, value: count };
    });

    // Month bar chart: work weeks (Mon–Fri) that overlap with the current month
    const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    const lastOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    // Find the Monday of the first week overlapping this month
    const firstMon = new Date(firstOfMonth);
    firstMon.setDate(firstMon.getDate() - ((firstMon.getDay() + 6) % 7));
    const weekBuckets = [];
    let wMon = new Date(firstMon);
    while (wMon <= lastOfMonth) {
      const wFri = new Date(wMon); wFri.setDate(wMon.getDate() + 5); // Saturday 00:00 = end of Friday
      // Only include if the work week overlaps with the current month
      if (wFri > firstOfMonth && wMon <= lastOfMonth) {
        const count = mndEntries.filter(h => {
          const d = new Date(h.isoDate);
          return d >= wMon && d < wFri && h.over5min === 'ja';
        }).length;
        weekBuckets.push({ label: `U${weekBuckets.length + 1}`, value: count });
      }
      wMon = new Date(wMon); wMon.setDate(wMon.getDate() + 7);
    }

    const pctColor = (p) => p === null ? 'var(--primary-dark)' : p >= 70 ? '#1a7a34' : p >= 40 ? '#9a6800' : '#b52030';

    const dateStr = now.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
      .replace(/^\w/, c => c.toUpperCase());

    document.getElementById('stats-home').innerHTML = `
      <div class="today-date-banner">${dateStr}</div>
      <div class="motivation-banner">${msg}</div>

      <!-- DAG -->
      <div class="stats-section">
        <div class="stats-section-title">☀️ I dag</div>
        <div class="stats-grid stats-grid-4">
          ${statCard('📞', dag.total, 'Forsøk', true)}
          ${statCard('🎯', dag.hitrate !== null ? `<span style="color:${pctColor(dag.hitrate)}">${dag.hitrate}%</span>` : '–', 'Hitrate opptak', true)}
          <div class="stat-card day-card quick-register-card">
            <button class="quick-undo-btn" onclick="quickUnregister('over5min')" title="Angre siste">↩</button>
            <div class="stat-icon big">⏱️</div>
            <div class="stat-value big">${dag.over5}</div>
            <div class="stat-label">5-minutters</div>
            <button class="quick-reg-btn" onclick="quickRegister('over5min')">+ Registrer</button>
          </div>
          <div class="stat-card day-card quick-register-card">
            <button class="quick-undo-btn" onclick="quickUnregister('salg')" title="Angre siste">↩</button>
            <div class="stat-icon big">💰</div>
            <div class="stat-value big">${dag.salg}</div>
            <div class="stat-label">Salg</div>
            <button class="quick-reg-btn salg" onclick="quickRegister('salg')">+ Registrer</button>
          </div>
        </div>
      </div>

      <!-- UKE -->
      <div class="stats-section">
        <div class="stats-section-title">📅 Denne uken</div>
        <div class="stats-grid stats-grid-2" style="margin-bottom:14px;">
          <div class="chart-card">
            <div class="chart-card-title">⏱️ 5-minutters per dag</div>
            ${barChart(weekData)}
          </div>
          <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:14px; align-content:start;">
            ${statCard('📞', uke.total, 'Forsøk totalt')}
            ${statCard('🎯', uke.hitrate !== null ? `<span style="color:${pctColor(uke.hitrate)}">${uke.hitrate}%</span>` : '–', 'Hitrate opptak')}
            ${statCard('⏱️', uke.over5, '5-minutters totalt')}
            ${statCard('💰', uke.salg, 'Salg')}
          </div>
        </div>
      </div>

      <!-- MÅNED -->
      <div class="stats-section">
        <div class="stats-section-title">🗓️ ${now.toLocaleString('no-NO', { month: 'long', year: 'numeric' }).replace(/^\w/, c => c.toUpperCase())}</div>
        <div class="stats-grid stats-grid-2">
          <div class="chart-card">
            <div class="chart-card-title">⏱️ 5-minutters per uke</div>
            ${barChart(weekBuckets)}
          </div>
          <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:14px; align-content:start;">
            ${statCard('📞', mnd.total, 'Forsøk totalt')}
            ${statCard('🎯', mnd.hitrate !== null ? `<span style="color:${pctColor(mnd.hitrate)}">${mnd.hitrate}%</span>` : '–', 'Hitrate opptak')}
            ${statCard('⏱️', mnd.over5, '5-minutters totalt')}
            ${statCard('💰', mnd.salg, 'Salg')}
          </div>
        </div>
      </div>
    `;
  }

  function hitrateClass(pct) {
    if (pct === null) return { bar: '', pct: '', border: '' };
    if (pct >= 70) return { bar: 'bar-green', pct: 'pct-green', border: 'border-green' };
    if (pct >= 40) return { bar: 'bar-yellow', pct: 'pct-yellow', border: 'border-yellow' };
    return { bar: 'bar-red', pct: 'pct-red', border: 'border-red' };
  }

  function renderIntroLibrary() {
    const container = document.getElementById('intro-library');
    const intros = getSavedIntros();
    if (!intros.length) {
      container.innerHTML = '<p class="intro-library-empty">Ingen introen lagret ennå – skriv den første nedenfor.</p>';
      return;
    }
    const history = getIntroHistory();

    const withStats = intros.map(i => {
      const attempts = history.filter(h => h.text.trim() === i.text.trim());
      const total = attempts.length;
      const ja = attempts.filter(h => h.opptak === 'ja').length;
      return { i, total, ja, nei: total - ja, hitrate: total > 0 ? ja / total : null };
    });

    withStats.sort((a, b) => {
      const aTop = a.total > 10;
      const bTop = b.total > 10;
      if (aTop && !bTop) return -1;
      if (!aTop && bTop) return 1;
      if (aTop && bTop) return b.hitrate - a.hitrate;
      return 0;
    });

    const medals = ['🥇', '🥈', '🥉'];

    container.innerHTML = withStats.map(({ i, total, ja, nei, hitrate }, idx) => {
      const pct = hitrate !== null ? Math.round(hitrate * 100) : null;
      const medal = total > 10 && idx < 3 ? medals[idx] : '';
      const cls = hitrateClass(pct);

      const barHtml = total > 0 ? `
        <div class="intro-chip-bar-wrap">
          <div class="intro-chip-bar ${cls.bar}" style="width:${pct}%"></div>
        </div>` : '';

      const statsRow = total > 0
        ? `<div class="intro-chip-stats" style="margin-top:5px;">${medal ? medal + ' ' : ''}${total} forsøk &nbsp;✅ ${ja} · ❌ ${nei}</div>`
        : `<div class="intro-chip-stats" style="margin-top:5px;">Ingen forsøk ennå</div>`;

      const pctHtml = pct !== null
        ? `<div class="intro-chip-pct ${cls.pct}">${pct}%</div>`
        : '';

      return `
        <div class="intro-chip ${cls.border} ${selectedIntroId === i.id ? 'selected' : ''}" onclick="selectIntro('${i.id}')">
          <div style="flex:1;min-width:0;">
            <div>${escHtml(i.text)}</div>
            ${statsRow}
            ${barHtml}
          </div>
          ${pctHtml}
          <button class="intro-chip-delete" title="Slett intro" onclick="event.stopPropagation(); deleteSavedIntro('${i.id}')">🗑</button>
        </div>
      `;
    }).join('');
  }

  function saveIntro() {
    const text = document.getElementById('intro-text').value.trim();
    if (!text) { alert('Skriv inn introen din først.'); return; }
    if (!selectedOpptak) { alert('Marker om du kom forbi opptaksspørsmålet.'); return; }

    addToIntroLibrary(text);

    const history = getIntroHistory();
    history.unshift({
      text,
      opptak: selectedOpptak,
      over5min: null,
      salg: null,
      isoDate: new Date().toISOString(),
      tid: new Date().toLocaleString('no-NO')
    });
    localStorage.setItem('introHistory', JSON.stringify(history));

    resetOpptak();
    renderStatsHome();
    renderIntroLibrary();
    renderIntroHistory();
  }

  function getIntroHistory() {
    return JSON.parse(localStorage.getItem('introHistory') || '[]');
  }

  function clearIntroHistory() {
    if (confirm('Slette all intro-historikk?')) {
      localStorage.removeItem('introHistory');
      renderIntroHistory();
    }
  }

  function renderIntroHistory() {
    const container = document.getElementById('intro-history');
    const history = getIntroHistory();
    if (!history.length) {
      container.innerHTML = '<p class="empty-state">Ingen forsøk registrert ennå.</p>';
      return;
    }
    container.innerHTML = history.map(h => `
      <div class="history-item">
        <div>${escHtml(h.text)}</div>
        <div class="meta">
          <span class="result-badge ${h.opptak === 'ja' ? 'badge-yes' : 'badge-no'}">
            Opptak: ${h.opptak === 'ja' ? '✅ Ja' : '❌ Nei'}
          </span>
          <span>${h.tid}</span>
        </div>
      </div>
    `).join('');
  }

  // ---- Objections ----
  const DEFAULT_OBJECTIONS = [
    'Jeg er ikke interessert',
    'Jeg har ikke tid nå',
    'Send meg noe på e-post',
    'Det er for dyrt',
    'Jeg er fornøyd med det jeg har',
    'Jeg har binding',
    'Jeg bestemmer ikke selv / må snakke med ektefelle',
    'Jeg vil ikke bytte leverandør',
    'Innvending 9',
    'Innvending 10',
    'Innvending 11',
    'Innvending 12',
  ];

  function getObjList() {
    const stored = localStorage.getItem('objectionsList');
    if (stored) return JSON.parse(stored);
    // First run: migrate defaults
    const list = DEFAULT_OBJECTIONS.map((text, i) => ({ id: 'obj_' + i, text }));
    localStorage.setItem('objectionsList', JSON.stringify(list));
    return list;
  }

  function saveObjList(list) {
    localStorage.setItem('objectionsList', JSON.stringify(list));
  }

  function getObjData(id) {
    return JSON.parse(localStorage.getItem('objdata_' + id) || '[]');
  }

  function selectObjResult(id, val) {
    document.getElementById('obj-ja-' + id).className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('obj-nei-' + id).className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
    document.getElementById('obj-ja-' + id).dataset.selected = val === 'ja' ? 'ja' : '';
    document.getElementById('obj-nei-' + id).dataset.selected = val === 'nei' ? 'nei' : '';
  }

  function saveObjResponse(id) {
    const textarea = document.getElementById('obj-text-' + id);
    const jaBtn = document.getElementById('obj-ja-' + id);
    const neiBtn = document.getElementById('obj-nei-' + id);
    const resultVal = jaBtn.dataset.selected === 'ja' ? 'ja' : neiBtn.dataset.selected === 'nei' ? 'nei' : null;
    const text = textarea.value.trim();
    if (!text) { alert('Skriv inn svaret ditt først.'); return; }
    if (!resultVal) { alert('Marker om det funket eller ikke.'); return; }

    const data = getObjData(id);
    data.unshift({ text, result: resultVal, tid: new Date().toLocaleString('no-NO') });
    localStorage.setItem('objdata_' + id, JSON.stringify(data));

    textarea.value = '';
    selectObjResult(id, null);
    renderObjHistory(id);
    renderObjStats(id);
    renderObjSummary();
  }

  function clearObjHistory(id) {
    if (confirm('Slette historikk for denne innvendingen?')) {
      localStorage.removeItem('objdata_' + id);
      renderObjHistory(id);
      renderObjStats(id);
      renderObjSummary();
    }
  }

  function deleteObjection(id) {
    const list = getObjList();
    const obj = list.find(o => o.id === id);
    if (!obj) return;
    if (!confirm(`Fjerne innvendingen "${obj.text}"?\n\nAll historikk for denne innvendingen slettes også.`)) return;
    saveObjList(list.filter(o => o.id !== id));
    localStorage.removeItem('objdata_' + id);
    buildObjections();
  }

  function addObjection() {
    const text = prompt('Skriv inn den nye innvendingen:');
    if (!text || !text.trim()) return;
    const list = getObjList();
    const id = 'obj_' + Date.now();
    list.push({ id, text: text.trim() });
    saveObjList(list);
    buildObjections();
    // Scroll to bottom so user sees the new card
    setTimeout(() => document.getElementById('tab-innvendinger').scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
  }

  function getBestAnswer(data) {
    if (!data.length) return null;
    const groups = {};
    data.forEach(d => {
      const key = d.text.trim().toLowerCase();
      if (!groups[key]) groups[key] = { text: d.text, ja: 0, total: 0 };
      groups[key].total++;
      if (d.result === 'ja') groups[key].ja++;
    });
    const entries = Object.values(groups).filter(g => g.ja > 0);
    if (!entries.length) return null;
    return entries.sort((a, b) => (b.ja / b.total) - (a.ja / a.total) || b.ja - a.ja)[0];
  }

  function successColor(pct) {
    if (pct >= 60) return '#1a9e52';
    if (pct >= 30) return '#e08a00';
    return '#c0392b';
  }

  function renderObjStats(id) {
    const container = document.getElementById('obj-stats-' + id);
    if (!container) return;
    const data = getObjData(id);
    if (!data.length) { container.innerHTML = ''; return; }
    const total = data.length;
    const ja = data.filter(d => d.result === 'ja').length;
    const pct = Math.round((ja / total) * 100);
    const color = successColor(pct);
    const best = getBestAnswer(data);
    const bestRate = best ? Math.round((best.ja / best.total) * 100) : 0;
    container.innerHTML = `
      <div class="obj-stats-bar">
        <div class="obj-stats-numbers">
          <span>🎯 ${total} forsøk</span>
          <span style="color:${color}">${pct}% funket</span>
        </div>
        <div class="obj-progress-track">
          <div class="obj-progress-fill" style="width:${pct}%; background:${color}"></div>
        </div>
      </div>
      ${best ? `
        <div class="obj-best-answer">
          <div class="obj-best-label">🏆 Beste svar <span class="obj-best-rate">${bestRate}% (${best.ja}/${best.total})</span></div>
          <div class="obj-best-text">${escHtml(best.text)}</div>
        </div>
      ` : ''}
    `;
  }

  function renderObjSummary() {
    const list = getObjList();
    const panel = document.getElementById('obj-summary-panel');
    const rows = document.getElementById('obj-summary-rows');
    const withData = list.filter(({ id }) => getObjData(id).length > 0);
    if (!withData.length) { panel.style.display = 'none'; return; }
    panel.style.display = '';
    rows.innerHTML = withData.map(({ id, text }) => {
      const data = getObjData(id);
      const total = data.length;
      const ja = data.filter(d => d.result === 'ja').length;
      const pct = Math.round((ja / total) * 100);
      const color = successColor(pct);
      return `
        <div class="obj-summary-row">
          <span class="obj-summary-name" title="${escHtml(text)}">💬 ${escHtml(text)}</span>
          <div class="obj-summary-mini-bar">
            <div class="obj-summary-mini-fill" style="width:${pct}%; background:${color}"></div>
          </div>
          <span class="obj-summary-pct" style="color:${color}">${pct}%</span>
          <span style="color:var(--muted); font-size:0.78rem">${ja}/${total}</span>
        </div>
      `;
    }).join('');
  }

  function renderObjHistory(id) {
    const container = document.getElementById('obj-history-' + id);
    if (!container) return;
    const data = getObjData(id);
    const toggle = document.getElementById('obj-history-toggle-' + id);
    if (!data.length) {
      container.innerHTML = '<p class="empty-state">Ingen svar registrert ennå.</p>';
      if (toggle) toggle.style.display = 'none';
      return;
    }
    if (toggle) { toggle.style.display = ''; toggle.textContent = `📋 Vis historikk (${data.length})`; }
    container.innerHTML = data.map(d => `
      <div class="history-item">
        <div>${escHtml(d.text)}</div>
        <div class="meta">
          <span class="result-badge ${d.result === 'ja' ? 'badge-yes' : 'badge-no'}">
            ${d.result === 'ja' ? '✅ Funket' : '❌ Funket ikke'}
          </span>
          <span>${d.tid}</span>
        </div>
      </div>
    `).join('');
  }

  function toggleObjHistory(id) {
    const panel = document.getElementById('obj-history-panel-' + id);
    const toggle = document.getElementById('obj-history-toggle-' + id);
    const data = getObjData(id);
    const open = panel.classList.toggle('open');
    toggle.textContent = open ? `📋 Skjul historikk (${data.length})` : `📋 Vis historikk (${data.length})`;
  }

  function buildObjections() {
    const list = getObjList();
    const container = document.getElementById('objections-container');
    container.innerHTML = list.map(({ id, text }) => `
      <div class="objection-card">
        <h3>💬 ${escHtml(text)}
          <button class="delete-objection-btn" onclick="deleteObjection('${id}')" title="Fjern innvending">🗑</button>
        </h3>
        <div id="obj-stats-${id}"></div>
        <label class="objection-label">Ditt svar på innvendingen:</label>
        <textarea id="obj-text-${id}" placeholder="Skriv svaret ditt her..."></textarea>
        <div style="margin-top: 10px;">
          <strong>Funket det?</strong>
          <div class="toggle-group">
            <button class="toggle-btn" id="obj-ja-${id}" onclick="selectObjResult('${id}', 'ja')">✅ Ja</button>
            <button class="toggle-btn" id="obj-nei-${id}" onclick="selectObjResult('${id}', 'nei')">❌ Nei</button>
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:14px;">
          <button class="save-btn" onclick="saveObjResponse('${id}')">Lagre svar</button>
          <button class="clear-btn" onclick="clearObjHistory('${id}')">Tøm historikk</button>
        </div>
        <button class="obj-history-toggle" id="obj-history-toggle-${id}" onclick="toggleObjHistory('${id}')" style="display:none"></button>
        <div id="obj-history-panel-${id}" class="obj-history-panel">
          <div id="obj-history-${id}" class="history-list" style="margin-top:12px;"></div>
        </div>
      </div>
    `).join('');

    list.forEach(({ id }) => { renderObjStats(id); renderObjHistory(id); });
    renderObjSummary();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- Init ----
  renderStatsHome();
  renderIntroLibrary();
  renderIntroHistory();
  buildObjections();

  // ---- Celebration GIFs (Giphy API) ----
  const GIPHY_KEY = 'AvCz5CgLUg69uON27oHVnFLY1IzbCx6c';
  const gifTags = { over5min: 'celebration', salg: 'money rain' };

  let gifTimer = null;

  async function showCelebrationGif(type) {
    const tag = gifTags[type];
    const label = type === 'salg' ? '💰 SALG! 💰' : '⏱️ 5-MINUTTERS! ⏱️';
    document.getElementById('gif-label').textContent = label;
    document.getElementById('gif-img').src = '';
    document.getElementById('gif-overlay').classList.add('visible');
    clearTimeout(gifTimer);
    gifTimer = setTimeout(closeGif, 6500);

    try {
      const res = await fetch(`https://api.giphy.com/v1/gifs/random?api_key=${GIPHY_KEY}&tag=${encodeURIComponent(tag)}&rating=g`);
      const data = await res.json();
      document.getElementById('gif-img').src = data.data.images.original.url;
    } catch {
      // fallback: keep overlay open without image
    }
  }

  function closeGif() {
    document.getElementById('gif-overlay').classList.remove('visible');
    clearTimeout(gifTimer);
  }

  // ---- Eksport / Import ----
  function quickUnregister(type) {
    const history = getIntroHistory();
    const todayStr = new Date().toISOString().slice(0, 10);
    // Find last today-entry where this field is 'ja' and it's a quickEntry
    const idx = [...history].map((h, i) => ({ h, i })).reverse()
      .find(({ h }) => h.quickEntry && h[type] === 'ja' && (h.isoDate || '').slice(0, 10) === todayStr);
    if (idx) {
      history.splice(idx.i, 1);
      localStorage.setItem('introHistory', JSON.stringify(history));
    }
    renderStatsHome();
  }

  function quickRegister(type) {
    const history = getIntroHistory();
    const now = new Date();
    const entry = {
      text: '',
      opptak: null,
      over5min: type === 'over5min' ? 'ja' : 'nei',
      salg: type === 'salg' ? 'ja' : 'nei',
      isoDate: now.toISOString(),
      tid: now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' }),
      quickEntry: true
    };
    history.push(entry);
    localStorage.setItem('introHistory', JSON.stringify(history));
    renderStatsHome();
    showCelebrationGif(type);
  }

  function exportData() {
    const list = getObjList();
    const keys = ['savedIntros', 'introHistory', 'objectionsList'];
    list.forEach(({ id }) => keys.push('objdata_' + id));
    // Also include legacy keys just in case
    for (let i = 0; i < 12; i++) keys.push('obj_' + i);
    const data = {};
    keys.forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = JSON.parse(v); });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'telenor-salg-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
        alert('✅ Data importert! Siden lastes inn på nytt.');
        location.reload();
      } catch { alert('❌ Feil: ugyldig backup-fil.'); }
    };
    reader.readAsText(file);
  }
</script>
</body>
