<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telenor Salg Trener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #29a8e0;
      --primary-dark:  #1a7fb5;
      --primary-light: #d6eef9;
      --primary-xlight:#f8fafc;
      --bg:            #f5f7fa;
      --card:          #ffffff;
      --text:          #1e293b;
      --muted:         #64748b;
      --border:        #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 30px 20px;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #1e293b;
      margin-bottom: 8px;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .top-bar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .tabs {
      display: inline-flex;
      background: #e2e8f0;
      padding: 4px;
      border-radius: 30px;
      gap: 2px;
    }

    .backup-btns {
      position: absolute;
      right: 0;
      display: flex;
      gap: 6px;
    }

    .backup-btn {
      padding: 5px 10px;
      border: 1px solid #ccc;
      background: white;
      color: #888;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .backup-btn:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .tab-btn {
      padding: 8px 22px;
      border: none;
      background: transparent;
      color: #64748b;
      border-radius: 26px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tab-btn.active, .tab-btn:hover {
      background: white;
      color: #1e293b;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto 20px auto;
      box-shadow: 0 2px 16px rgba(41,168,224,0.10);
      border: 1px solid var(--border);
    }

    .card h2 {
      color: var(--primary-dark);
      margin-bottom: 16px;
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      background: var(--primary-xlight);
      color: var(--text);
      transition: border-color 0.15s;
    }

    textarea:focus { outline: none; border-color: var(--primary); background: white; }

    .radio-group { display: flex; gap: 16px; margin-top: 8px; }

    .toggle-group {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .toggle-btn {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--primary-xlight);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      color: var(--text);
    }

    .toggle-btn:hover { border-color: var(--primary); background: var(--primary-light); }

    .toggle-btn.selected-ja {
      border-color: #28a745;
      background: #d4edda;
      color: #155724;
    }

    .toggle-btn.selected-nei {
      border-color: #dc3545;
      background: #f8d7da;
      color: #721c24;
    }

    .save-btn {
      margin-top: 16px;
      padding: 11px 26px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.15s;
      box-shadow: 0 3px 10px rgba(41,168,224,0.3);
    }

    .save-btn:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(41,168,224,0.4); }

    .result-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-yes { background: #d4edda; color: #155724; }
    .badge-no  { background: #f8d7da; color: #721c24; }

    .history-list { margin-top: 20px; }

    .history-item {
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      margin-bottom: 10px;
      background: var(--primary-xlight);
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
    }

    .history-item .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .delete-entry-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      opacity: 0.5;
      padding: 0 2px;
      line-height: 1;
      transition: opacity 0.2s;
    }
    .delete-entry-btn:hover { opacity: 1; }

    .objection-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      max-width: 720px;
      margin: 0 auto 14px auto;
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
      border: 1px solid var(--border);
    }

    .objection-card h3 {
      color: var(--primary-dark);
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .objection-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 20px 0;
    }

    .clear-btn {
      float: right;
      background: none;
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .clear-btn:hover { border-color: #c00; color: #c00; }

    .add-objection-btn {
      padding: 12px 32px;
      background: white;
      border: 2px dashed var(--primary);
      color: var(--primary-dark);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-objection-btn:hover { background: var(--primary-light); }

    .delete-objection-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #ccc;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s;
      float: right;
    }
    .delete-objection-btn:hover { color: #c00; }

    /* Objection stats */
    .obj-stats-bar {
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--primary-xlight);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .obj-stats-numbers {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 7px;
      color: var(--text);
    }

    .obj-progress-track {
      height: 8px;
      background: #dde;
      border-radius: 99px;
      overflow: hidden;
    }

    .obj-progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .obj-best-answer {
      margin-top: 10px;
      padding: 10px 14px;
      background: #eafaf1;
      border: 1px solid #a9dfbf;
      border-radius: 10px;
      font-size: 0.88rem;
    }

    .obj-best-label {
      font-weight: 700;
      color: #1a7a34;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .obj-best-rate {
      background: #d4edda;
      color: #155724;
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .obj-best-text {
      color: var(--text);
      line-height: 1.5;
    }

    .obj-history-toggle {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--primary-dark);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .obj-history-toggle:hover { background: var(--primary-xlight); border-color: var(--primary); }

    .obj-history-panel { display: none; }
    .obj-history-panel.open { display: block; }

    /* Objection summary panel */
    .obj-summary-panel {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 24px;
      max-width: 720px;
      margin: 0 auto 20px auto;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .obj-summary-panel h2 {
      color: var(--primary-dark);
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .obj-summary-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .obj-summary-row:last-child { border-bottom: none; }

    .obj-summary-name {
      flex: 1;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .obj-summary-mini-bar {
      flex: 1;
      height: 7px;
      background: #dde;
      border-radius: 99px;
      overflow: hidden;
    }

    .obj-summary-mini-fill {
      height: 100%;
      border-radius: 99px;
    }

    .obj-summary-pct {
      font-weight: 700;
      min-width: 42px;
      text-align: right;
    }

    .obj-summary-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }

    /* Intro library */
    .intro-library {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .intro-library-empty {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
    }

    .intro-chip {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--primary-xlight);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
      text-align: left;
    }

    .intro-chip:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .intro-chip.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      font-weight: 600;
    }

    .intro-chip-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: #aaa;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }

    .intro-chip-delete:hover { color: #c00; }

    .intro-chip-stats {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .intro-chip-stats .hit {
      color: #1a7a34;
      font-weight: 700;
    }

    /* Intro two-column layout */
    .intro-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    @media (max-width: 700px) {
      .intro-layout { grid-template-columns: 1fr; }
    }

    .leaderboard-card {
      background: var(--card);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 16px rgba(41,168,224,0.10);
      border: 1px solid var(--border);
    }

    .leaderboard-card h2 {
      color: var(--primary-dark);
      margin-bottom: 16px;
      font-size: 1.15rem;
    }

    .history-toggle-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--primary-dark);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-toggle-btn:hover {
      background: var(--primary-xlight);
      border-color: var(--primary);
    }

    .history-panel {
      display: none;
      margin-top: 4px;
    }

    .history-panel.open { display: block; }

    /* ===== STATS HOME PAGE ===== */
    .stats-section { max-width: 1100px; margin: 0 auto 32px auto; }

    .stats-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .stats-grid {
      display: grid;
      gap: 14px;
    }
    .stats-grid-4 { grid-template-columns: repeat(4, 1fr); }
    .stats-grid-2 { grid-template-columns: 1fr 1fr; }

    @media (max-width: 800px) {
      .stats-grid-4 { grid-template-columns: repeat(2, 1fr); }
      .stats-grid-2 { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 18px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .stat-card.day-card { padding: 26px 18px; }

    .quick-register-card { padding-bottom: 16px !important; position: relative; }

    .quick-undo-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 0.85rem;
      color: #999;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s;
    }
    .quick-undo-btn:hover { border-color: #999; color: #555; background: #f0f0f0; }

    .quick-reg-btn {
      margin-top: 12px;
      padding: 10px 22px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #29a8e0, #1a7ab0);
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 14px rgba(41,168,224,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .quick-reg-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(41,168,224,0.45); }
    .quick-reg-btn:active { transform: scale(0.96); }

    .quick-reg-btn.salg {
      background: linear-gradient(135deg, #2ecc71, #1a9e52);
      box-shadow: 0 4px 14px rgba(46,204,113,0.35);
    }
    .quick-reg-btn.salg:hover { box-shadow: 0 6px 18px rgba(46,204,113,0.45); }

    .stat-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .stat-icon.big { font-size: 2.2rem; }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 900;
      color: #1e293b;
      line-height: 1;
    }
    .stat-value.big { font-size: 3rem; }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* Motivational banner */
    .today-date-banner {
      max-width: 1100px;
      margin: 0 auto 14px auto;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: 0.02em;
    }

    .motivation-banner {
      max-width: 1100px;
      margin: 0 auto 24px auto;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
      padding: 0 4px;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-fill {
      width: 100%;
      background: var(--primary);
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height 0.4s ease;
      position: relative;
    }

    .bar-fill:hover { background: var(--primary-dark); }

    .bar-val {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 3px;
    }

    .bar-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 5px;
      text-align: center;
    }

    .chart-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(41,168,224,0.09);
    }

    .chart-card-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    /* Leaderboard progress bar */
    .intro-chip-bar-wrap {
      height: 6px;
      background: #e0e0e0;
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }

    .intro-chip-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .bar-green { background: #28a745; }
    .bar-yellow { background: #f0ad00; }
    .bar-red { background: #dc3545; }

    .intro-chip-pct {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1;
      flex-shrink: 0;
      min-width: 52px;
      text-align: right;
    }

    .pct-green { color: #1a7a34; }
    .pct-yellow { color: #9a6800; }
    .pct-red { color: #b52030; }

    .intro-chip.border-green { border-left: 4px solid #28a745; }
    .intro-chip.border-yellow { border-left: 4px solid #f0ad00; }
    .intro-chip.border-red { border-left: 4px solid #dc3545; }
    /* GIF overlay */
    #gif-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 18px;
      cursor: pointer;
      animation: fadeInOverlay 0.3s ease;
    }
    #gif-overlay.visible { display: flex; }
    #gif-label {
      color: white;
      font-size: 1.6rem;
      font-weight: 800;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* Objection collapse */
    .objection-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .objection-card-header:hover h3 { color: var(--primary); }

    .objection-collapse-icon {
      font-size: 0.9rem;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .objection-card.expanded .objection-collapse-icon {
      transform: rotate(180deg);
    }

    .objection-card-body { display: none; margin-top: 12px; }
    .objection-card.expanded .objection-card-body { display: block; }

    /* ===== SAMTALEFLYT v2 ===== */
    #sf-outer {
      display: flex;
      flex-direction: column;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Canvas wrapper */
    #sf-canvas-wrap {
      position: relative;
      overflow: auto;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      background: #f8fafc;
      min-height: 300px;
      max-height: 65vh;
      cursor: default;
    }

    #sf-canvas {
      position: relative;
    }

    #sf-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* Node boxes */
    .sf-node {
      position: absolute;
      width: 200px;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-size: 0.82rem;
      color: #1e293b;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      user-select: none;
    }
    .sf-node:hover { border-color: #29a8e0; }
    .sf-node.selected {
      border-color: #29a8e0;
      box-shadow: 0 0 0 3px rgba(41,168,224,0.18);
    }
    .sf-node.root-node { border-color: #1e293b; }

    .sf-node-preview {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .sf-node-empty .sf-node-preview {
      font-style: italic;
      color: #94a3b8;
    }

    /* Add root button (shown when tree is empty) */

    .sf-branch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

<body>

<!-- CELEBRATION OVERLAY -->
<div id="gif-overlay" onclick="closeGif()">
  <canvas id="confetti-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
  <div id="gif-label"></div>
  <div style="color:white;font-size:0.9rem;opacity:0.6;">Trykk for å lukke</div>

<h1>Aki salg trener</h1>
<p class="subtitle">Tren på introer og innvendinger</p>

<div class="top-bar">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('intro')">Registrer</button>
    <button class="tab-btn" onclick="switchTab('hjem')">Stats</button>

  <div class="backup-btns">

    <button class="backup-btn" onclick="exportData()" title="Last ned sikkerhetskopi">Eksporter data</button>

<script>
  // ---- Google Sheets sync ----
  // Paste your Google Apps Script URL below after deploying (see instructions)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyj9bEAfEKDC_fuQYP821nOWFiQo9ZAPkL8olEw8VhdYmuihprilbOLxgMOxjL8VoQvFA/exec';

  const _origSetItem    = localStorage.setItem.bind(localStorage);
  const _origRemoveItem = localStorage.removeItem.bind(localStorage);
  const _origGetItem    = localStorage.getItem.bind(localStorage);

  // Auto-sync 800ms after any localStorage write
  let syncTimeout = null;
  localStorage.setItem    = function(k, v) { _origSetItem(k, v);    scheduleSync(); };
  localStorage.removeItem = function(k)    { _origRemoveItem(k);     scheduleSync(); };

  function scheduleSync() {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(syncToCloud, 800);
  }

  function getAllData() {
    const list = JSON.parse(_origGetItem('objectionsList') || '[]');
    const keys = ['savedIntros', 'introHistory', 'objectionsList', 'samtaleflyt', 'samtaleflyt2'];
    list.forEach(({ id }) => keys.push('objdata_' + id));
    const data = {};
    keys.forEach(k => { const v = _origGetItem(k); if (v) data[k] = JSON.parse(v); });
    return data;
  }

  function syncToCloud() {
    if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_SCRIPT')) return;
    setSyncStatus('syncing');
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(getAllData())
    }).then(() => setSyncStatus('ok')).catch(() => setSyncStatus('error'));
  }

  async function loadFromCloud() {
    if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_SCRIPT')) return;
    setSyncStatus('loading');
    try {
      const r = await fetch(SCRIPT_URL, { redirect: 'follow' });
      const data = await r.json();
      if (data && typeof data === 'object' && Object.keys(data).length > 0) {
        Object.entries(data).forEach(([k, v]) => _origSetItem(k, JSON.stringify(v)));
      }
      setSyncStatus('ok');
    } catch { setSyncStatus('error'); }
  }

  function setSyncStatus(s) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const map = { ok: 'Synkronisert', syncing: 'Synkroniserer...', loading: 'Laster data...', error: 'Synk feilet' };
    el.textContent = map[s] || '';
  }
  // ---- End Google Sheets sync ----

  function toggleHistory() {
    const panel = document.getElementById('history-panel');
    const btn = document.querySelector('.history-toggle-btn');
    const open = panel.classList.toggle('open');
    btn.textContent = open ? 'Skjul historikk' : 'Vis historikk';
  }

  // ---- Tab switching ----
  function switchTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'samtaleflyt') renderSamtaleflyt();
  }

  let selectedOpptak = null;
  let selectedOver5min = null;
  let selectedSalg = null;

  function selectOpptak(val) {
    selectedOpptak = val;
    document.getElementById('opptak-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('opptak-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function selectOver5min(val) {
    selectedOver5min = val;
    document.getElementById('over5min-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('over5min-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function selectSalg(val) {
    selectedSalg = val;
    document.getElementById('salg-ja').className = 'toggle-btn' + (val === 'ja' ? ' selected-ja' : '');
    document.getElementById('salg-nei').className = 'toggle-btn' + (val === 'nei' ? ' selected-nei' : '');
  }

  function resetOpptak() {
    selectedOpptak = null;
    selectedOver5min = null;
    selectedSalg = null;
    ['opptak-ja','opptak-nei','over5min-ja','over5min-nei','salg-ja','salg-nei']
      .forEach(id => { const el = document.getElementById(id); if (el) el.className = 'toggle-btn'; });
  }

  // ---- Intro ----
  let selectedIntroId = null;

  function getSavedIntros() {
    return JSON.parse(localStorage.getItem('savedIntros') || '[]');
  }

  function addToIntroLibrary(text) {
    const intros = getSavedIntros();
    const exists = intros.some(i => i.text.trim() === text.trim());
    if (exists) return;
    intros.push({ id: Date.now().toString(), text, createdAt: new Date().toISOString() });
    localStorage.setItem('savedIntros', JSON.stringify(intros));
  }

  function deleteSavedIntro(id) {
    if (!confirm('Slette denne introen fra biblioteket?')) return;
    const intros = getSavedIntros().filter(i => i.id !== id);
    localStorage.setItem('savedIntros', JSON.stringify(intros));
    if (selectedIntroId === id) {
      selectedIntroId = null;
      document.getElementById('intro-text').value = '';
    }
    renderIntroLibrary();
  }

  function selectIntro(id) {
    const intros = getSavedIntros();
    const intro = intros.find(i => i.id === id);
    if (!intro) return;
    selectedIntroId = id;
    document.getElementById('intro-text').value = intro.text;
    renderIntroLibrary();
  }

  function clearIntroSelection() {
    selectedIntroId = null;
    document.getElementById('intro-text').value = '';
    document.getElementById('intro-text').focus();
    renderIntroLibrary();
  }

  // ---- Stats helpers ----
  function isoToDate(iso) { return iso ? new Date(iso) : null; }

  function isToday(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const n = new Date();
    return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
  }

  function isThisWeek(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const now = new Date();
    const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay() + 6) % 7)); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 7);
    return d >= mon && d < sun;
  }

  function isThisMonth(iso) {
    const d = isoToDate(iso); if (!d) return false;
    const n = new Date();
    return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth();
  }

  function statsFor(entries) {
    const introEntries = entries.filter(h => !h.quickEntry);
    const total = introEntries.length;
    const opptak = introEntries.filter(h => h.opptak === 'ja').length;
    const over5 = entries.filter(h => h.over5min === 'ja').length;
    const salg = entries.filter(h => h.salg === 'ja').length;
    const hitrate = total > 0 ? Math.round(opptak / total * 100) : null;
    return { total, opptak, over5, salg, hitrate };
  }

  function statCard(value, label, big = false) {
    return `<div class="stat-card${big ? ' day-card' : ''}">
      <div class="stat-value${big ? ' big' : ''}">${value}</div>
      <div class="stat-label">${label}</div>
    </div>`;
  }

  function barChart(data) {
    // data = [{label, value}]
    const max = Math.max(...data.map(d => d.value), 1);
    return `<div class="bar-chart">` + data.map(d => {
      const h = Math.round((d.value / max) * 100);
      return `<div class="bar-col">
        <div class="bar-val">${d.value > 0 ? d.value : ''}</div>
        <div class="bar-fill" style="height:${h}%"></div>
        <div class="bar-lbl">${d.label}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  function renderStatsHome() {
    const history = getIntroHistory();
    const dagEntries = history.filter(h => isToday(h.isoDate));
    const ukeEntries = history.filter(h => isThisWeek(h.isoDate));
    const mndEntries = history.filter(h => isThisMonth(h.isoDate));

    const dag = statsFor(dagEntries);
    const uke = statsFor(ukeEntries);
    const mnd = statsFor(mndEntries);

    // Motivation
    const motivations = [
      [80, 'Du er i toppform i dag! Fortsett slik!'],
      [60, 'Bra jobbet! Du er på rett vei!'],
      [40, 'God innsats! Øvelse gjør mester!'],
      [0,  'Hvert forsøk teller – hold det gående!'],
    ];
    const msg = dag.total === 0 ? 'Ingen forsøk registrert i dag ennå – lykke til!' :
      motivations.find(([min]) => (dag.hitrate ?? 0) >= min)[1];

    // Week bar chart: 5-min per weekday (Mon–Fri only)
    const days = ['Man','Tir','Ons','Tor','Fre'];
    const now = new Date();
    const monOffset = (now.getDay() + 6) % 7;
    const weekData = days.map((lbl, i) => {
      const day = new Date(now); day.setDate(now.getDate() - monOffset + i); day.setHours(0,0,0,0);
      const next = new Date(day); next.setDate(day.getDate() + 1);
      const count = ukeEntries.filter(h => { const d = new Date(h.isoDate); return d >= day && d < next && h.over5min === 'ja'; }).length;
      return { label: lbl, value: count };
    });

    // Month bar chart: work weeks (Mon–Fri) that overlap with the current month
    const firstOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    const lastOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    // Find the Monday of the first week overlapping this month
    const firstMon = new Date(firstOfMonth);
    firstMon.setDate(firstMon.getDate() - ((firstMon.getDay() + 6) % 7));
    const weekBuckets = [];
    let wMon = new Date(firstMon);
    while (wMon <= lastOfMonth) {
      const wFri = new Date(wMon); wFri.setDate(wMon.getDate() + 5); // Saturday 00:00 = end of Friday
      // Only include if the work week overlaps with the current month
      if (wFri > firstOfMonth && wMon <= lastOfMonth) {
        const count = mndEntries.filter(h => {
          const d = new Date(h.isoDate);
          return d >= wMon && d < wFri && h.over5min === 'ja';
        }).length;
        weekBuckets.push({ label: `U${weekBuckets.length + 1}`, value: count });
      }
      wMon = new Date(wMon); wMon.setDate(wMon.getDate() + 7);
    }

    const pctColor = (p) => p === null ? 'var(--primary-dark)' : p >= 70 ? '#1a7a34' : p >= 40 ? '#9a6800' : '#b52030';

    const dateStr = now.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
      .replace(/^\w/, c => c.toUpperCase());

    document.getElementById('stats-home').innerHTML = `
      <div class="today-date-banner">${dateStr}</div>
      <div class="motivation-banner">${msg}</div>

      <!-- DAG -->
      <div class="stats-section">
        <div class="stats-section-title">I dag</div>
        <div class="stats-grid stats-grid-4">
          ${statCard(dag.total, 'Forsøk', true)}
          ${statCard(dag.hitrate !== null ? `<span style="color:${pctColor(dag.hitrate)}">${dag.hitrate}%</span>` : '–', 'Hitrate opptak', true)}
          ${statCard(dag.over5, '5-minutters', true)}
          ${statCard(dag.salg, 'Salg', true)}
        </div>
      </div>

      <!-- UKE -->
      <div class="stats-section">
        <div class="stats-section-title">Denne uken</div>
        <div class="stats-grid stats-grid-2" style="margin-bottom:14px;">
          <div class="chart-card">
            <div class="chart-card-title">5-minutters per dag</div>
            ${barChart(weekData)}
          </div>
          <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:14px; align-content:start;">
            ${statCard(uke.total, 'Forsøk totalt')}
            ${statCard(uke.hitrate !== null ? `<span style="color:${pctColor(uke.hitrate)}">${uke.hitrate}%</span>` : '–', 'Hitrate opptak')}
            ${statCard(uke.over5, '5-minutters totalt')}
            ${statCard(uke.salg, 'Salg')}
          </div>
        </div>
      </div>

      <!-- MÅNED -->
      <div class="stats-section">
        <div class="stats-section-title">${now.toLocaleString('no-NO', { month: 'long', year: 'numeric' }).replace(/^\w/, c => c.toUpperCase())}</div>
        <div class="stats-grid stats-grid-2">
          <div class="chart-card">
            <div class="chart-card-title">5-minutters per uke</div>
            ${barChart(weekBuckets)}
          </div>
          <div class="stats-grid" style="grid-template-columns:1fr 1fr; gap:14px; align-content:start;">
            ${statCard(mnd.total, 'Forsøk totalt')}
            ${statCard(mnd.hitrate !== null ? `<span style="color:${pctColor(mnd.hitrate)}">${mnd.hitrate}%</span>` : '–', 'Hitrate opptak')}
            ${statCard(mnd.over5, '5-minutters totalt')}
            ${statCard(mnd.salg, 'Salg')}
          </div>
        </div>
      </div>
    `;
  }

  function hitrateClass(pct) {
    if (pct === null) return { bar: '', pct: '', border: '' };
    if (pct >= 70) return { bar: 'bar-green', pct: 'pct-green', border: 'border-green' };
    if (pct >= 40) return { bar: 'bar-yellow', pct: 'pct-yellow', border: 'border-yellow' };
    return { bar: 'bar-red', pct: 'pct-red', border: 'border-red' };
  }

  function renderIntroLibraryInline() {
    const container = document.getElementById('intro-library-inline');
    if (!container) return;
    const intros = getSavedIntros();
    if (!intros.length) { container.innerHTML = ''; return; }
    const history = getIntroHistory();

  function getBestAnswer(data) {
    if (!data.length) return null;
    const groups = {};
    data.forEach(d => {
      const key = d.text.trim().toLowerCase();
      if (!groups[key]) groups[key] = { text: d.text, ja: 0, total: 0 };
      groups[key].total++;
      if (d.result === 'ja') groups[key].ja++;
    });
    const entries = Object.values(groups).filter(g => g.ja > 0);
    if (!entries.length) return null;
    return entries.sort((a, b) => (b.ja / b.total) - (a.ja / a.total) || b.ja - a.ja)[0];
  }

  function startConfetti(colors) {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: 6 + Math.random() * 8,
      d: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 10,
      tiltSpeed: 0.1 + Math.random() * 0.2
    }));
    let angle = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      angle += 0.01;
      pieces.forEach(p => {
        p.tilt += p.tiltSpeed;
        p.y += p.d;
        p.x += Math.sin(angle) * 1.5;
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.r, p.r / 2, p.tilt, 0, 2 * Math.PI);
        ctx.fillStyle = p.color;
        ctx.fill();
      });
      confettiFrame = requestAnimationFrame(draw);
    }
    cancelAnimationFrame(confettiFrame);
    draw();
  }

  // ===== SAMTALEFLYT v2 =====

  const NODE_W = 200;
  const NODE_H = 80;  // approximate, used for layout
  const H_GAP  = 60;  // horizontal gap between siblings
  const V_GAP  = 90;  // vertical gap between levels
  const PAD    = 40;  // canvas padding

  let sfSelectedId = null;

  function sfGetData() {
    const s = _origGetItem('samtaleflyt2');
    if (s) { try { return JSON.parse(s); } catch {} }
    return { rootId: null, nodes: {} };
  }

  function sfSaveData(data) {
    localStorage.setItem('samtaleflyt2', JSON.stringify(data));
  }

  // ── Layout ──────────────────────────────────────────────────────────────
  // Returns a map of nodeId → { x, y, subtreeWidth }
  function sfLayout(data) {
    const positions = {};
    if (!data.rootId || !data.nodes[data.rootId]) return positions;

    function subtreeWidth(id) {
      const node = data.nodes[id];
      if (!node) return NODE_W;
      if (!node.children || node.children.length === 0) return NODE_W;
      const childWidths = node.children.map(c => subtreeWidth(c.nodeId));
      const total = childWidths.reduce((a, b) => a + b, 0) + H_GAP * (node.children.length - 1);
      return Math.max(NODE_W, total);
    }

    function place(id, cx, depth) {
      const node = data.nodes[id];
      if (!node) return;
      const x = cx - NODE_W / 2;
      const y = PAD + depth * (NODE_H + V_GAP);
      positions[id] = { x, y };
      if (!node.children || node.children.length === 0) return;
      const childWidths = node.children.map(c => subtreeWidth(c.nodeId));
      const totalW = childWidths.reduce((a, b) => a + b, 0) + H_GAP * (node.children.length - 1);
      let curX = cx - totalW / 2;
      node.children.forEach((c, i) => {
        const cw = childWidths[i];
        place(c.nodeId, curX + cw / 2, depth + 1);
        curX += cw + H_GAP;
      });
    }

    const rw = subtreeWidth(data.rootId);
    place(data.rootId, PAD + rw / 2, 0);
    return positions;
  }

  function sfCanvasSize(positions) {
    let maxX = 0, maxY = 0;
    Object.values(positions).forEach(p => {
      maxX = Math.max(maxX, p.x + NODE_W + PAD);
      maxY = Math.max(maxY, p.y + NODE_H + PAD);
    });
    return { w: Math.max(maxX, 400), h: Math.max(maxY, 200) };
  }

  // ── Render ──────────────────────────────────────────────────────────────
  function renderSamtaleflyt() {
    const data = sfGetData();
    const canvas = document.getElementById('sf-canvas');
    const svg    = document.getElementById('sf-svg');
    if (!canvas || !svg) return;

    // Clear old nodes (not svg)
    canvas.querySelectorAll('.sf-node').forEach(n => n.remove());

    if (!data.rootId || Object.keys(data.nodes).length === 0) {
      svg.innerHTML = '';
      canvas.style.width  = '100%';
      canvas.style.height = '300px';
      svg.setAttribute('width',  '100%');
      svg.setAttribute('height', '300');
      if (!document.getElementById('sf-add-root-btn')) {
        const btn = document.createElement('button');
        btn.id = 'sf-add-root-btn';
        btn.textContent = 'Start samtaleflyt';
        btn.onclick = sfAddRoot;
        canvas.appendChild(btn);
      }
      return;
    }

    // Remove "start" button if present
    const startBtn = document.getElementById('sf-add-root-btn');
    if (startBtn) startBtn.remove();

    const positions = sfLayout(data);
    const { w, h } = sfCanvasSize(positions);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    svg.setAttribute('width',  w);
    svg.setAttribute('height', h);

    // Draw SVG arrows
    let svgContent = '';
    Object.values(data.nodes).forEach(node => {
      if (!node.children) return;
      const from = positions[node.id];
      if (!from) return;
      node.children.forEach(child => {
        const to = positions[child.nodeId];
        if (!to) return;
        const x1 = from.x + NODE_W / 2;
        const y1 = from.y + NODE_H;
        const x2 = to.x + NODE_W / 2;
        const y2 = to.y;
        const cy1 = y1 + V_GAP * 0.5;
        const cy2 = y2 - V_GAP * 0.5;
        const mx  = (x1 + x2) / 2;
        const my  = (y1 + y2) / 2;
        svgContent += `
          <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#cbd5e1"/>
            </marker>
          </defs>
          <path d="M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}"
                stroke="#cbd5e1" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
          <text class="sf-arrow-label" x="${mx}" y="${my - 6}" text-anchor="middle">${sfEsc(child.label)}</text>
        `;
      });
    });
    svg.innerHTML = svgContent;

    // Draw node boxes
    Object.values(data.nodes).forEach(node => {
      const pos = positions[node.id];
      if (!pos) return;
      const isRoot     = node.id === data.rootId;
      const isSelected = node.id === sfSelectedId;
      const isEmpty    = !node.text || node.text.trim() === '';
      const preview    = isEmpty ? 'Klikk for å redigere' : node.text;
      const shortPrev  = preview.length > 60 ? preview.slice(0, 60) + '…' : preview;

      const div = document.createElement('div');
      div.className = 'sf-node' +
        (isRoot     ? ' root-node' : '') +
        (isSelected ? ' selected'  : '') +
        (isEmpty    ? ' sf-node-empty' : '');
      div.style.left = pos.x + 'px';
      div.style.top  = pos.y + 'px';
      div.innerHTML = `
        ${isRoot ? '<div class="sf-node-label">Start</div>' : ''}
        <div class="sf-node-preview">${sfEsc(shortPrev)}</div>
      `;
      div.onclick = () => sfSelectNode(node.id);
      canvas.appendChild(div);
    });

    sfRenderDetail(data);
  }

  function sfSelectNode(id) {
    sfSelectedId = id;
    renderSamtaleflyt();
  }

  function sfRenderDetail(data) {
    const panel = document.getElementById('sf-detail');
    if (!panel) return;
    if (!sfSelectedId || !data.nodes[sfSelectedId]) {
      panel.classList.remove('open');
      return;
    }
    panel.classList.add('open');
    const node = data.nodes[sfSelectedId];
    document.getElementById('sf-detail-title').textContent =
      node.id === data.rootId ? 'Startsteg' : 'Steg';
    document.getElementById('sf-detail-script').value = node.text || '';

    const list = document.getElementById('sf-branch-list');
    list.innerHTML = (node.children || []).map((c, i) => `
      <div class="sf-branch-row">
        <input class="sf-branch-label-input" id="sf-bl-${i}" value="${sfEsc(c.label)}" placeholder="Kunden sier..."/>
        <button class="sf-go-btn" onclick="sfSelectNode('${c.nodeId}')">Gå til</button>
        <button class="sf-branch-del-btn" onclick="sfDeleteBranch(${i})">×</button>
      </div>
    `).join('');
  }

  function sfSaveCurrentNode() {
    if (!sfSelectedId) return;
    const data = sfGetData();
    const node = data.nodes[sfSelectedId];
    if (!node) return;
    node.text = document.getElementById('sf-detail-script').value;
    const inputs = document.querySelectorAll('.sf-branch-label-input');
    inputs.forEach((inp, i) => { if (node.children[i]) node.children[i].label = inp.value; });
    sfSaveData(data);
    renderSamtaleflyt();
  }

  function sfAddBranch() {
    sfSaveCurrentNode();
    const data = sfGetData();
    const node = data.nodes[sfSelectedId];
    if (!node) return;
    const newId = 'n_' + Date.now();
    data.nodes[newId] = { id: newId, text: '', children: [] };
    if (!node.children) node.children = [];
    node.children.push({ label: 'Kunden sier...', nodeId: newId });
    sfSaveData(data);
    renderSamtaleflyt();
  }

  function sfDeleteBranch(idx) {
    const data = sfGetData();
    const node = data.nodes[sfSelectedId];
    if (!node || !node.children[idx]) return;
    // Remove the child subtree
    sfDeleteSubtree(data, node.children[idx].nodeId);
    node.children.splice(idx, 1);
    sfSaveData(data);
    renderSamtaleflyt();
  }

  function sfDeleteSubtree(data, id) {
    const node = data.nodes[id];
    if (!node) return;
    (node.children || []).forEach(c => sfDeleteSubtree(data, c.nodeId));
    delete data.nodes[id];
  }

  function sfDeleteCurrentNode() {
    if (!sfSelectedId) return;
    const data = sfGetData();
    if (sfSelectedId === data.rootId) {
      if (!confirm('Slette hele samtaleflyt-treet?')) return;
      data.rootId = null;
      data.nodes  = {};
      sfSelectedId = null;
      sfSaveData(data);
      renderSamtaleflyt();
      return;
    }
    if (!confirm('Slette dette steget og alle steg under det?')) return;
    // Remove reference from parent
    Object.values(data.nodes).forEach(n => {
      if (n.children) n.children = n.children.filter(c => c.nodeId !== sfSelectedId);
    });
    sfDeleteSubtree(data, sfSelectedId);
    sfSelectedId = null;
    sfSaveData(data);
    renderSamtaleflyt();
  }

  function sfAddRoot() {
    const data = sfGetData();
    const id = 'n_root_' + Date.now();
    data.nodes[id] = { id, text: '', children: [] };
    data.rootId = id;
    sfSelectedId = id;
    sfSaveData(data);
    renderSamtaleflyt();
  }

  function sfEsc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== END SAMTALEFLYT v2 =====

</script>
</body>
</html>
